<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words Match | 单词匹配</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-dark: #2563eb;
            --success: #10b981;
            --success-light: #34d399;
            --error: #ef4444;
            --error-light: #f87171;
            --warning: #f59e0b;
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --transition-slow: 400ms ease;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --glass-bg: rgba(30, 41, 59, 0.95);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .bg-blob-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            top: -200px;
            right: -200px;
        }

        .bg-blob-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        .bg-blob-3 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-normal);
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .stat-icon.score { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
        .stat-icon.progress { background: linear-gradient(135deg, #34d399 0%, #10b981 100%); }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 6px;
            width: fit-content;
        }

        .mode-tab {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-tab:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .mode-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .mode-tab svg {
            width: 18px;
            height: 18px;
        }

        .game-area {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: 0 8px 32px var(--glass-shadow);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .game-header .game-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-header .game-title span {
            color: var(--primary-light);
        }

        .game-header .progress-bar {
            flex: 1;
            max-width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .game-header .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
            border-radius: 4px;
            transition: width var(--transition-slow);
        }

        .game-header .progress-text {
            font-size: 14px;
            color: var(--text-secondary);
            min-width: 80px;
            text-align: right;
        }

        /* Match Mode Styles */
        .match-container {
            display: none;
        }

        .match-container.active {
            display: block;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .match-column {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .match-column-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .match-column-title svg {
            width: 16px;
            height: 16px;
        }

        .match-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            padding: 36px 40px;
            cursor: pointer;
            transition: var(--transition-normal);
            font-size: 22px;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
            min-height: 90px;
        }

        .match-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            opacity: 0;
            transition: var(--transition-normal);
        }

        .match-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .match-item.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        .match-item.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.15);
            pointer-events: none;
        }

        .match-item.correct::after {
            content: '✓';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--success);
            font-weight: 700;
        }

        .match-item.wrong {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.15);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .match-item.matched {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Spelling Mode Styles */
        .spelling-container {
            display: none;
        }

        .spelling-container.active {
            display: block;
        }

        .spelling-card {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .spelling-word-display {
            margin-bottom: 32px;
        }

        .spelling-chinese {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .spelling-hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .spelling-hint svg {
            width: 16px;
            height: 16px;
        }

        .spelling-input-area {
            margin-bottom: 24px;
        }

        .spelling-input {
            width: 100%;
            max-width: 400px;
            padding: 16px 24px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition-normal);
            font-family: inherit;
        }

        .spelling-input:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .spelling-input.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .spelling-input.wrong {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            animation: shake 0.5s ease;
        }

        .spelling-letter-hints {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .letter-hint {
            width: 40px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
            transition: var(--transition-normal);
        }

        .letter-hint.revealed {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .spelling-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-light) 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
        }

        .spelling-feedback {
            margin-top: 24px;
            padding: 16px;
            border-radius: var(--radius-md);
            display: none;
        }

        .spelling-feedback.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .spelling-feedback.correct {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
        }

        .spelling-feedback.wrong {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .feedback-title.correct { color: var(--success); }
        .feedback-title.wrong { color: var(--error); }

        .correct-answer {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Completion Screen */
        .completion-screen {
            display: none;
            text-align: center;
            padding: 48px 24px;
        }

        .completion-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .completion-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--success) 0%, var(--success-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 16px 48px rgba(16, 185, 129, 0.4);
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .completion-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--success) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .completion-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .completion-stat {
            text-align: center;
        }

        .completion-stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-light);
        }

        .completion-stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Round Transition */
        .round-transition {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border-radius: var(--radius-xl);
        }

        .round-transition.show {
            opacity: 1;
            pointer-events: auto;
        }

        .round-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--success) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }

            .container {
                padding: 0;
                max-width: 100%;
                min-height: 100dvh;
            }

            /* 隐藏顶部彩虹条 */
            .rainbow-bar {
                display: none;
            }

            /* 隐藏 header */
            header {
                display: none;
            }

            /* 隐藏 CET-4 徽章 */
            .cet4-badge {
                display: none;
            }

            /* 隐藏模式切换 */
            .mode-tabs {
                display: none;
            }

            /* 统计栏简化 - 只显示倒计时 */
            .stats-bar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(20px);
                padding: 12px 16px;
                justify-content: center;
            }

            .stat-item {
                display: none;
            }

            .stat-item:has(.timer-container) {
                display: flex;
                min-width: auto;
                padding: 0;
            }

            .timer-container {
                font-size: 20px;
                font-weight: 700;
                padding: 10px 24px;
                background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
                border-radius: 12px;
            }

            /* 游戏区域全屏 */
            .game-area {
                padding: 80px 12px 20px;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
            }

            /* 单词匹配布局 - 左右并排，占据主要空间 */
            .match-container {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .match-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                flex: 1;
                align-content: center;
            }

            .match-column {
                gap: 8px;
            }

            .match-column-title {
                font-size: 11px;
                margin-bottom: 6px;
                justify-content: center;
            }

            /* 单词卡片占据更多空间 */
            .match-item {
                padding: 16px 8px;
                font-size: 18px;
                min-height: 80px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                border-radius: 12px;
                font-weight: 500;
            }

            /* 进度条简化 */
            .progress-container {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 12px 16px;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(20px);
            }

            /* 拼写模式优化 */
            .spelling-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .spelling-card {
                padding: 16px;
            }

            .spelling-chinese {
                font-size: 32px;
                margin-bottom: 20px;
                font-weight: 600;
            }

            .spelling-input {
                font-size: 24px;
                padding: 18px 20px;
                max-width: 100%;
            }

            .letter-hints {
                gap: 6px;
            }

            .letter-hint {
                width: 32px;
                height: 40px;
                font-size: 16px;
            }

            .spelling-actions {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }

            .spelling-actions .btn {
                flex: 1;
                min-width: 100px;
                max-width: 180px;
            }

            /* 完成界面 */
            .completion-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .completion-title {
                font-size: 22px;
            }

            .completion-stats {
                gap: 16px;
            }

            .completion-stat-value {
                font-size: 24px;
            }

            /* 移动端模式切换按钮 */
            .mobile-mode-switch {
                display: none;
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
                padding: 12px 24px;
                background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
                color: white;
                border: none;
                border-radius: var(--radius-xl);
                font-size: 16px;

            .word-bank-toggle {

            }

    <script>
        const WORDS_PER_ROUND = 4;
        const ROUND_TIME = 20;
        const PAUSE_EVERY_ROUNDS = 5; // 每5轮暂停一次
        
        let isProcessing = false;
        let currentList = 'cet4';
        let currentMode = 'match';
        let allWords = [];
        let currentRoundWords = [];
        let usedWordIndices = [];
        let currentRound = 0;
        let totalRounds = 0;
        let matchedPairs = 0;
        let totalPairs = 0;
        let selectedEnglish = null;
        let selectedChinese = null;
        let score = 0;
        let gameStarted = false; // 游戏是否已开始
        let roundsSinceLastPause = 0; // 自上次暂停以来的轮数

        // Fisher-Yates Shuffle Algorithm
        function fisherYatesShuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        let correctCount = 0;
        let totalAttempts = 0;
        let spellingIndex = 0;
        let revealedLetters = [];
        let hintsUsed = 0;
        let wrongWords = [];
        let timerInterval = null;
        let timeLeft = ROUND_TIME;
        let roundStartTime = 0;

        function init() {
            setupEventListeners();
            showReadyScreen();
        }

        function showReadyScreen() {
            // 隐藏游戏容器
            document.getElementById('matchContainer').classList.remove('active');
            document.getElementById('spellingContainer').classList.remove('active');
            document.getElementById('completionScreen').classList.remove('active');
            document.getElementById('pauseScreen').classList.remove('active');
            
            // 显示准备界面
            const readyScreen = document.getElementById('readyScreen');
            const readySubtitle = document.getElementById('readySubtitle');
            readySubtitle.textContent = currentMode === 'match' ? '单词匹配模式' : '单词拼写模式';
            readyScreen.classList.add('active');
            
            gameStarted = false;
        }

        function startCountdown() {
            // 隐藏准备界面
            document.getElementById('readyScreen').classList.remove('active');
            
            // 显示倒计时
            const countdownScreen = document.getElementById('countdownScreen');
            const countdownNumber = document.getElementById('countdownNumber');
            countdownScreen.classList.add('active');
            
            let count = 3;
            countdownNumber.textContent = count;
            
            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                    // 重新触发动画
                    countdownNumber.style.animation = 'none';
                    countdownNumber.offsetHeight; // 触发重绘
                    countdownNumber.style.animation = 'countdownPulse 1s ease-in-out';
                } else {
                    clearInterval(countInterval);
                    countdownScreen.classList.remove('active');
                    // 开始游戏
                    gameStarted = true;
                    startGame();
                }
            }, 1000);
        }

        function showPauseScreen() {
            stopTimer();
            
            const pauseScreen = document.getElementById('pauseScreen');
            const pauseTitle = document.querySelector('.pause-title');
            
            pauseTitle.textContent = `已完成 ${currentRound} 轮`;
            document.getElementById('pauseScore').textContent = score;
            
            const accuracy = totalAttempts > 0 
                ? Math.round((correctCount / totalAttempts) * 100) 
                : 0;
            document.getElementById('pauseAccuracy').textContent = `${accuracy}%`;
            
            pauseScreen.classList.add('active');
        }

        function continueGame() {
            document.getElementById('pauseScreen').classList.remove('active');
            roundsSinceLastPause = 0;
            startNewRound();
        }

        function endGame() {
            document.getElementById('pauseScreen').classList.remove('active');
            showCompletion();
        }

        function setupEventListeners() {
            // 桌面端模式切换按钮
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.addEventListener('click', () => switchMode(tab.dataset.mode));
            });

            // 移动端底部导航栏
            document.querySelectorAll('.mobile-tab').forEach(tab => {
                tab.addEventListener('click', () => switchMode(tab.dataset.mode));
            });

            document.getElementById('hintBtn').addEventListener('click', revealHint);
            document.getElementById('checkBtn').addEventListener('click', checkSpelling);
            document.getElementById('skipBtn').addEventListener('click', skipWord);
            document.getElementById('restartBtn').addEventListener('click', () => {
                showReadyScreen();
            });

            document.getElementById('spellingInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkSpelling();
            });

            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
            document.getElementById('focusBtn').addEventListener('click', toggleFocusMode);
            document.getElementById('skipRoundBtn').addEventListener('click', skipCurrentRound);
            
            // 准备开始按钮
            document.getElementById('startReadyBtn').addEventListener('click', startCountdown);
            
            // 暂停界面按钮
            document.getElementById('endGameBtn').addEventListener('click', endGame);
            document.getElementById('continueGameBtn').addEventListener('click', continueGame);
            
            document.getElementById('wordBankToggle').addEventListener('click', toggleWordBank);
            
            document.getElementById('wrongWordsToggle').addEventListener('click', toggleWrongWords);
            document.getElementById('clearWrongWords').addEventListener('click', clearWrongWords);
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            if (isDark) {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
            
            const themeIcon = document.getElementById('themeIcon');
            if (isDark) {
                themeIcon.innerHTML = `
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                `;
            } else {
                themeIcon.innerHTML = `
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                `;
            }
        }

        function toggleFocusMode() {
            document.body.classList.toggle('focus-mode');
            const focusBtn = document.getElementById('focusBtn');
            const isActive = document.body.classList.contains('focus-mode');
            focusBtn.style.background = isActive ? 'var(--primary)' : '';
        }

        function toggleWordBank() {
            const panel = document.getElementById('wordBankPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                renderWordBank();
            }
        }

        function renderWordBank() {
            const list = document.getElementById('wordBankList');
            const words = wordLists[currentList].words;
            document.getElementById('wordBankCount').textContent = `${words.length} 词`;
            
            list.innerHTML = words.map(word => `
                <div class="word-bank-item">
                    <div>
                        <div class="word-bank-english">${word.english}</div>
                        <div class="word-bank-chinese">${word.chinese}</div>
                    </div>
                </div>
            `).join('');
        }

        function skipCurrentRound() {
            addUnmatchedToWrongWords();
            if (usedWordIndices.length >= allWords.length) {
                showCompletion();
            } else {
                startNewRound();
            }
        }

        function toggleWrongWords() {
            const panel = document.getElementById('wrongWordsPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                renderWrongWords();
            }
        }

        function renderWrongWords() {
            const list = document.getElementById('wrongWordsList');
            const count = document.getElementById('wrongCount');
            count.textContent = wrongWords.length;
            
            if (wrongWords.length === 0) {
                list.innerHTML = `
                    <div class="empty-wrong-list">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <div>暂无错词记录</div>
                    </div>
                `;
                return;
            }
            
            const wordCounts = {};
            wrongWords.forEach(word => {
                const key = word.english;
                if (!wordCounts[key]) {
                    wordCounts[key] = { ...word, count: 0 };
                }
                wordCounts[key].count++;
            });
            
            list.innerHTML = Object.values(wordCounts).map(word => `
                <div class="wrong-word-item">
                    <div class="wrong-word-content">
                        <div class="wrong-word-english">${word.english}</div>
                        <div class="wrong-word-chinese">${word.chinese}</div>
                    </div>
                    <span class="wrong-word-count">${word.count}次</span>
                </div>
            `).join('');
        }

        function clearWrongWords() {
            wrongWords = [];
            renderWrongWords();
        }

        function addWrongWord(word) {
            wrongWords.push(word);
            updateWrongCount();
        }

        function updateWrongCount() {
            document.getElementById('wrongCount').textContent = wrongWords.length;
        }

        function addUnmatchedToWrongWords() {
            const unmatchedItems = document.querySelectorAll('.match-item:not(.matched)');
            unmatchedItems.forEach(item => {
                const word = {
                    english: item.dataset.english,
                    chinese: item.dataset.chinese
                };
                addWrongWord(word);
            });
        }

        function startTimer() {
            stopTimer();
            timeLeft = ROUND_TIME;
            roundStartTime = Date.now();
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    stopTimer();
                    handleTimeUp();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timerDisplay');
            const container = document.getElementById('timerContainer');
            const progressFill = document.getElementById('timerProgressFill');
            
            display.textContent = timeLeft;
            
            const progress = (timeLeft / ROUND_TIME) * 100;
            progressFill.style.width = `${progress}%`;
            
            if (timeLeft <= 5) {
                container.classList.add('warning');
            } else {
                container.classList.remove('warning');
            }
        }

        function handleTimeUp() {
            addUnmatchedToWrongWords();
            
            if (usedWordIndices.length >= allWords.length) {
                showCompletion();
            } else {
                startNewRound();
            }
        }

        function switchMode(mode) {
            // 状态保护：如果正在处理动画，拦截切换请求
            if (isProcessing) {
                console.log('正在处理中，请稍候再切换模式');
                return;
            }
            
            // 停止当前计时器
            stopTimer();
            
            // 重置状态
            selectedEnglish = null;
            selectedChinese = null;
            
            currentMode = mode;
            
            // 更新桌面端模式切换按钮状态
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            
            // 更新移动端底部导航栏状态
            document.querySelectorAll('.mobile-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });

            // 平滑切换视图
            const matchContainer = document.getElementById('matchContainer');
            const spellingContainer = document.getElementById('spellingContainer');
            
            matchContainer.classList.toggle('active', mode === 'match');
            spellingContainer.classList.toggle('active', mode === 'spelling');
            document.getElementById('completionScreen').classList.remove('active');

            document.getElementById('gameModeTitle').textContent = mode === 'match' ? '单词匹配' : '单词拼写';

            // 重新开始游戏
            startGame();
        }

        function startGame() {
            allWords = [...wordLists[currentList].words];
            usedWordIndices = [];
            currentRound = 0;
            totalRounds = Math.ceil(allWords.length / WORDS_PER_ROUND);
            score = 0;
            correctCount = 0;
            totalAttempts = 0;
            roundsSinceLastPause = 0;

            document.getElementById('completionScreen').classList.remove('active');
            document.getElementById('matchContainer').classList.toggle('active', currentMode === 'match');
            document.getElementById('spellingContainer').classList.toggle('active', currentMode === 'spelling');

            startNewRound();
        }

        function startNewRound() {
            stopTimer();
            matchedPairs = 0;
            spellingIndex = 0;
            hintsUsed = 0;
            revealedLetters = [];
            selectedEnglish = null;
            selectedChinese = null;
            currentRound++;
            roundsSinceLastPause++;

            const availableIndices = [];
            for (let i = 0; i < allWords.length; i++) {
                if (!usedWordIndices.includes(i)) {
                    availableIndices.push(i);
                }
            }

            // Fisher-Yates shuffle for random selection
            for (let i = availableIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableIndices[i], availableIndices[j]] = [availableIndices[j], availableIndices[i]];
            }

            const roundIndices = availableIndices.slice(0, WORDS_PER_ROUND);
            currentRoundWords = roundIndices.map(i => allWords[i]);
            totalPairs = currentRoundWords.length;

            if (currentRoundWords.length === 0) {
                showCompletion();
                return;
            }

            usedWordIndices.push(...roundIndices);

            showRoundTransition();
        }

        function showRoundTransition() {
            const transition = document.getElementById('roundTransition');
            const roundNumber = document.getElementById('roundNumber');
            roundNumber.textContent = `第 ${currentRound} 轮`;
            transition.classList.add('show');

            setTimeout(() => {
                transition.classList.remove('show');
                
                if (currentMode === 'match') {
                    setupMatchMode();
                    startTimer();
                } else {
                    setupSpellingMode();
                    startTimer();
                }

                updateProgress();
                updateStats();
            }, 1000);
        }

        function setupMatchMode() {
            const shuffledEnglish = [...currentRoundWords].sort(() => Math.random() - 0.5);
            const shuffledChinese = [...currentRoundWords].sort(() => Math.random() - 0.5);

            const englishColumn = document.getElementById('englishColumn');
            const chineseColumn = document.getElementById('chineseColumn');

            englishColumn.innerHTML = '';
            chineseColumn.innerHTML = '';

            shuffledEnglish.forEach((word, index) => {
                const item = document.createElement('div');
                item.className = 'match-item';
                item.dataset.english = word.english;
                item.dataset.chinese = word.chinese;
                item.textContent = word.english;
                item.tabIndex = 0;
                item.setAttribute('role', 'button');
                item.setAttribute('aria-label', `英文单词: ${word.english}`);
                englishColumn.appendChild(item);
            });

            shuffledChinese.forEach((word, index) => {
                const item = document.createElement('div');
                item.className = 'match-item';
                item.dataset.english = word.english;
                item.dataset.chinese = word.chinese;
                item.textContent = word.chinese;
                item.tabIndex = 0;
                item.setAttribute('role', 'button');
                item.setAttribute('aria-label', `中文释义: ${word.chinese}`);
                chineseColumn.appendChild(item);
            });

            document.querySelectorAll('.match-item').forEach(item => {
                item.addEventListener('click', handleMatchClick);
                item.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        handleMatchClick.call(item, e);
                    }
                });
            });

            selectedEnglish = null;
            selectedChinese = null;
        }

        function handleMatchClick(e) {
            if (isProcessing) return;
            const item = e.currentTarget;
            if (item.classList.contains('matched') || item.classList.contains('correct')) return;

            const isEnglishColumn = item.parentElement.id === 'englishColumn';

            if (isEnglishColumn) {
                if (selectedEnglish) {
                    selectedEnglish.classList.remove('selected');
                }
                selectedEnglish = item;
                item.classList.add('selected');
            } else {
                if (selectedChinese) {
                    selectedChinese.classList.remove('selected');
                }
                selectedChinese = item;
                item.classList.add('selected');
            }

            if (selectedEnglish && selectedChinese) {
                checkMatch();
            }
        }

        function checkMatch() {
            if (isProcessing) return;
            isProcessing = true;
            
            totalAttempts++;
            const isCorrect = selectedEnglish.dataset.english === selectedChinese.dataset.english;

            if (isCorrect) {
                // 匹配成功
                selectedEnglish.classList.add('correct', 'matched');
                selectedChinese.classList.add('correct', 'matched');
                selectedEnglish.classList.remove('selected');
                selectedChinese.classList.remove('selected');
                
                matchedPairs++;
                correctCount++;
                score += 10;
                
                updateStats();
                updateProgress();

                // 检查是否完成本轮
                if (matchedPairs === totalPairs) {
                    stopTimer();
                    setTimeout(() => {
                        isProcessing = false;
                        if (usedWordIndices.length >= allWords.length) {
                            showCompletion();
                        } else if (roundsSinceLastPause >= PAUSE_EVERY_ROUNDS) {
                            // 每5轮暂停一次
                            showPauseScreen();
                        } else {
                            startNewRound();
                        }
                    }, 500);
                } else {
                    // 继续匹配，立即释放锁
                    selectedEnglish = null;
                    selectedChinese = null;
                    isProcessing = false;
                }
            } else {
                // 匹配失败
                selectedEnglish.classList.add('wrong');
                selectedChinese.classList.add('wrong');
                
                addWrongWord({
                    english: selectedEnglish.dataset.english,
                    chinese: selectedEnglish.dataset.chinese
                });
                
                updateStats();

                // 使用局部变量保存引用，防止异步访问时丢失
                const english = selectedEnglish;
                const chinese = selectedChinese;

                setTimeout(() => {
                    if (english) english.classList.remove('wrong', 'selected');
                    if (chinese) chinese.classList.remove('wrong', 'selected');
                    selectedEnglish = null;
                    selectedChinese = null;
                    isProcessing = false; // 释放锁
                }, 600);
            }
        }

        function setupSpellingMode() {
            if (spellingIndex >= currentRoundWords.length) {
                stopTimer();
                if (usedWordIndices.length >= allWords.length) {
                    showCompletion();
                } else if (roundsSinceLastPause >= PAUSE_EVERY_ROUNDS) {
                    // 每5轮暂停一次
                    showPauseScreen();
                } else {
                    startNewRound();
                }
                return;
            }

            const word = currentRoundWords[spellingIndex];
            document.getElementById('spellingChinese').textContent = word.chinese;
            document.getElementById('spellingInput').value = '';
            document.getElementById('spellingInput').classList.remove('correct', 'wrong');
            document.getElementById('spellingFeedback').classList.remove('show', 'correct', 'wrong');
            
            revealedLetters = new Array(word.english.length).fill(false);
            hintsUsed = 0;
            
            renderLetterHints();
            updateProgress();
            
            document.getElementById('spellingHint').textContent = `单词长度: ${word.english.length} 个字母`;
            document.getElementById('spellingInput').focus();
        }

        function renderLetterHints() {
            const word = currentRoundWords[spellingIndex];
            const container = document.getElementById('letterHints');
            container.innerHTML = '';

            word.english.split('').forEach((letter, index) => {
                const hint = document.createElement('div');
                hint.className = `letter-hint ${revealedLetters[index] ? 'revealed' : ''}`;
                hint.textContent = revealedLetters[index] ? letter.toUpperCase() : '';
                container.appendChild(hint);
            });
        }

        function revealHint() {
            const word = currentRoundWords[spellingIndex];
            const unrevealedIndices = revealedLetters
                .map((revealed, index) => (!revealed ? index : -1))
                .filter(index => index !== -1);

            if (unrevealedIndices.length === 0) return;

            const randomIndex = unrevealedIndices[Math.floor(Math.random() * unrevealedIndices.length)];
            revealedLetters[randomIndex] = true;
            hintsUsed++;
            
            renderLetterHints();

            const input = document.getElementById('spellingInput');
            if (!input.value) {
                let hintValue = '';
                word.english.split('').forEach((letter, index) => {
                    hintValue += revealedLetters[index] ? letter : '_';
                });
            }
        }

        function checkSpelling() {
            if (isProcessing) return;
            isProcessing = true;
            
            const input = document.getElementById('spellingInput');
            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = currentRoundWords[spellingIndex].english.toLowerCase();

            if (!userAnswer) {
                isProcessing = false;
                return;
            }

            // 禁用输入框，防止动画期间用户输入
            input.disabled = true;

            totalAttempts++;
            const feedback = document.getElementById('spellingFeedback');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const correctAnswerEl = document.getElementById('correctAnswer');

            if (userAnswer === correctAnswer) {
                input.classList.add('correct');
                feedback.classList.add('show', 'correct');
                feedback.classList.remove('wrong');
                feedbackTitle.className = 'feedback-title correct';
                feedbackTitle.innerHTML = '✓ 正确！';
                correctAnswerEl.textContent = currentRoundWords[spellingIndex].english;
                
                correctCount++;
                const hintPenalty = Math.max(0, hintsUsed * 2);
                score += Math.max(5, 15 - hintPenalty);
                
                updateStats();

                setTimeout(() => {
                    spellingIndex++;
                    setupSpellingMode();
                    stopTimer();
                    startTimer();
                    input.disabled = false;
                    input.focus();
                    isProcessing = false;
                }, 1500);
            } else {
                input.classList.add('wrong');
                feedback.classList.add('show', 'wrong');
                feedback.classList.remove('correct');
                feedbackTitle.className = 'feedback-title wrong';
                feedbackTitle.innerHTML = '✗ 错误';
                correctAnswerEl.textContent = `正确答案: ${currentRoundWords[spellingIndex].english}`;
                
                addWrongWord(currentRoundWords[spellingIndex]);
                updateStats();

                setTimeout(() => {
                    input.classList.remove('wrong');
                    input.value = '';
                    input.disabled = false; // 启用输入框
                    input.focus();
                    isProcessing = false; // 释放锁
                    input.focus();
                }, 1500);
            }
        }

        function skipWord() {
            if (isProcessing) return;
            isProcessing = true;
            
            const input = document.getElementById('spellingInput');
            input.disabled = true; // 禁用输入框
            addWrongWord(currentRoundWords[spellingIndex]);
            totalAttempts++;
            updateStats();
            
            const feedback = document.getElementById('spellingFeedback');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const correctAnswerEl = document.getElementById('correctAnswer');
            
            feedback.classList.add('show', 'wrong');
            feedback.classList.remove('correct');
            feedbackTitle.className = 'feedback-title wrong';
            feedbackTitle.innerHTML = '已跳过';
            correctAnswerEl.textContent = `正确答案: ${currentRoundWords[spellingIndex].english}`;

            setTimeout(() => {
                spellingIndex++;
                setupSpellingMode();
                input.disabled = false; // 启用输入框
                input.focus();
                isProcessing = false; // 释放锁
            }, 1500);
        }

        function updateProgress() {
            const roundProgress = currentMode === 'match' 
                ? (matchedPairs / totalPairs) * 100 
                : (spellingIndex / currentRoundWords.length) * 100;
            
            document.getElementById('progressFill').style.width = `${roundProgress}%`;
            
            const current = currentMode === 'match' ? matchedPairs : spellingIndex;
            const total = currentMode === 'match' ? totalPairs : currentRoundWords.length;
            document.getElementById('progressText').textContent = `第${currentRound}轮 ${current}/${total}`;
        }

        function updateStats() {
            document.getElementById('totalScore').textContent = score;
            
            const accuracy = totalAttempts > 0 
                ? Math.round((correctCount / totalAttempts) * 100) 
                : 0;
            document.getElementById('accuracy').textContent = `${accuracy}%`;
        }

        function showCompletion() {
            document.getElementById('matchContainer').classList.remove('active');
            document.getElementById('spellingContainer').classList.remove('active');
            document.getElementById('completionScreen').classList.add('active');

            const accuracy = totalAttempts > 0 
                ? Math.round((correctCount / totalAttempts) * 100) 
                : 0;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
            document.querySelector('.completion-title').textContent = `恭喜完成全部 ${totalRounds} 轮！`;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
